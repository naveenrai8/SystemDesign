<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
<link rel="stylesheet" th:href="@{/css/demo.css}">
<head>
  <meta charset="UTF-8">
  <title>Its title</title>
</head>
<body>
<h1>Running using Thymeleaf template.</h1>
<p th:text="'Student First name: ' + ${student.firstName}" class="funny"></p>
<p th:text="'Student Last name: ' + ${student.lastName}" class="funny"></p>
<p th:text="'Student age: ' + ${student.age}" class="funny"></p>
<p th:text="'Student message: ' + ${student.message}" class="funny"></p>
<p th:text="'Student Postal Code: ' + ${student.postalCode}" class="funny"></p>
<p th:text="'Country name: ' + ${student.country}" class="funny"></p>
<p th:text="'Language: ' + ${student.language}" class="funny"></p>
<ul>
  <li th:each="l: ${student.allLanguages}" th:text="'Languages: ' + ${l}" class="funny"></li>
</ul>
</body>
</html>
